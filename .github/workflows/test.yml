# Splice — Test Workflow
# Runs frontend (Vitest) and Rust (cargo test) tests on every push and PR.
name: Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Frontend tests
        run: npx vitest run

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
