# Splice — Reusable Test & Lint Workflow
# Called by test.yml and release.yml via workflow_call.
# Runs: TypeScript checks, frontend tests, Rust tests, Rust lint, security audit.
name: Test & Lint

on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npx vitest run

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - run: cargo test
        working-directory: src-tauri

      - run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - run: cargo audit
        working-directory: src-tauri
