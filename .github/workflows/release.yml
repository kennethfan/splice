# Splice — Release Workflow
# Builds for macOS (.app/.dmg, both ARM64 + x86_64), Linux (.deb/.AppImage),
# and Windows (.msi) on tag push matching v*.*.* (e.g., v0.1.0, v0.2.0).
#
# Usage:
#   1. Merge PR to master
#   2. git tag v0.2.0
#   3. git push origin v0.2.0
#   4. Workflow builds and creates a draft release with platform artifacts
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    uses: ./.github/workflows/test-and-lint.yml

  build-and-release:
    name: Build and Release (${{ matrix.label }})
    needs: quality
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            label: macOS (ARM64)
            arch_suffix: arm64
          - os: macos-13
            label: macOS (x86_64)
            arch_suffix: x64
          - os: ubuntu-latest
            label: Linux (x86_64)
            arch_suffix: x64
          - os: windows-latest
            label: Windows (x86_64)
            arch_suffix: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splice v__VERSION__"
          releaseBody: |
            ## Splice v__VERSION__

            ### What's Changed
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Downloads
            - **macOS (ARM64)**: Apple Silicon (M1/M2/M3/M4) — `.app` + `.dmg`
            - **macOS (x86_64)**: Intel Mac — `.app` + `.dmg`
            - **Linux**: `.deb` and `.AppImage`
            - **Windows**: `.msi` installer
          releaseDraft: true
          prerelease: false
