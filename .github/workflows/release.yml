# Splice — Release Workflow
# Builds for macOS (.app/.dmg, universal ARM64 + x86_64), Linux (.deb/.AppImage),
# and Windows (.msi) on tag push matching v*.*.* (e.g., v0.1.0, v0.2.0).
#
# Usage:
#   1. Merge PR to master
#   2. git tag v0.2.0
#   3. git push origin v0.2.0
#   4. Workflow builds and creates a draft release with platform artifacts
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  quality:
    uses: ./.github/workflows/test-and-lint.yml

  # ── macOS ARM64 (Apple Silicon) ──
  build-macos-arm64:
    name: Build macOS (ARM64)
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable

      - run: npm run build
      - name: Build ARM64 binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: splice-arm64
          path: src-tauri/target/release/splice

  # ── macOS x86_64 (Intel) ──
  build-macos-x64:
    name: Build macOS (x86_64)
    needs: quality
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable

      - run: npm run build
      - name: Build x86_64 binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Upload x86_64 binary
        uses: actions/upload-artifact@v4
        with:
          name: splice-x64
          path: src-tauri/target/release/splice

  # ── macOS Universal (merge ARM64 + x86_64, build .app/.dmg, upload) ──
  build-macos-universal:
    name: Build macOS (Universal DMG)
    needs: [build-macos-arm64, build-macos-x64]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add aarch64-apple-darwin

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: splice-arm64
          path: target/arm64

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: splice-x64
          path: target/x64

      - name: Create universal binary with lipo
        run: |
          mkdir -p target/universal
          lipo -create -output target/universal/splice \
            target/arm64/splice \
            target/x64/splice
          lipo -info target/universal/splice

      - name: Get version from Cargo.toml
        run: |
          APP_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Build ARM64 app bundle
        run: npx tauri build --bundles app --target aarch64-apple-darwin

      - name: Replace binary with universal, repack DMG
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Splice.app"
          cp target/universal/splice "$APP/Contents/MacOS/Splice"
          codesign --force --sign - --deep "$APP"
          file "$APP/Contents/MacOS/Splice"

          DMG_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "Splice" -srcfolder "$APP" \
            -ov -format UDZO \
            "$DMG_DIR/Splice_${APP_VERSION}_universal.dmg"

          echo "DMG_PATH=$DMG_DIR/Splice_${APP_VERSION}_universal.dmg" >> $GITHUB_ENV

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Splice ${{ github.ref_name }}" \
            --draft \
            --notes "## Splice ${{ github.ref_name }}

            ### What's Changed
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Downloads
            - **macOS (Universal)**: Apple Silicon + Intel — \`.dmg\` disk image
            - **Linux**: \`.deb\` and \`.AppImage\`
            - **Windows**: \`.msi\` installer" || true

          gh release upload "${{ github.ref_name }}" "${{ env.DMG_PATH }}" --clobber

  # ── Linux ──
  build-linux:
    name: Build Linux (x86_64)
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splice ${{ github.ref_name }}"
          releaseBody: |
            ## Splice ${{ github.ref_name }}

            ### What's Changed
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Downloads
            - **macOS (Universal)**: Apple Silicon + Intel — `.dmg` disk image
            - **Linux**: `.deb` and `.AppImage`
            - **Windows**: `.msi` installer
          releaseDraft: true
          prerelease: false

  # ── Windows ──
  build-windows:
    name: Build Windows (x86_64)
    needs: quality
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Splice ${{ github.ref_name }}"
          releaseBody: |
            ## Splice ${{ github.ref_name }}

            ### What's Changed
            See the [commit log](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ### Downloads
            - **macOS (Universal)**: Apple Silicon + Intel — `.dmg` disk image
            - **Linux**: `.deb` and `.AppImage`
            - **Windows**: `.msi` installer
          releaseDraft: true
          prerelease: false
